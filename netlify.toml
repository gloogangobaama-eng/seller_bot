[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "../dist"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"
  included_files = ["../netlify/functions/**"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false
